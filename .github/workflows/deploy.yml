name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Hoặc tên branch chính của bạn

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build # Lệnh này sẽ tạo ra thư mục /dist

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # QUAN TRỌNG: Phải trỏ vào thư mục dist
          path: './dist'

  deploy:
    needs: build_site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
