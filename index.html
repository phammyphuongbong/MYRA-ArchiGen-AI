<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MYRA - ARCHIGEN AI</title>
    <script>
      (function() {
        try {
          var _fetch = window.fetch;
          if (_fetch) {
            Object.defineProperty(window, 'fetch', {
              value: _fetch,
              writable: true,
              configurable: true
            });
          }
        } catch (e) {
          console.warn('Failed to make fetch writable in index.html', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
